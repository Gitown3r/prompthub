<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub Webpage</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-container">
    <header>
        <div class="logo-title">
            <div class="logo-icon"></div>
            <h1 class="site-title">PromptHub</h1>
        </div>
        <input type="search" class="search-bar" placeholder="Search prompts, tags, or platforms...">
        <div class="action-area">
            <button class="new-prompt-button">+ New Prompt</button>
            <div class="account-circle">VV</div>
        </div>
    </header>

    <nav class="ai-filter-bar">
        <ul class="ai-filters">
            <li><button class="active">All</button></li>
            <li><button>Midjourney</button></li>
            <li><button>ChatGPT</button></li>
            <li><button>Code Snippets</button></li>
            <li><button>Copywriting</button></li>
            <li><button>Favorites</button></li>
        </ul>
    </nav>
    <main>
        <article class="prompt-card" th:each="prompt : ${prompts}">

            <div class="card-header image-card">
                <img class="card-image" th:src="${prompt.imageUrl}" th:alt="${prompt.title}">
                <div class="card-overlay-icon image-overlay-icon"></div>
            </div>

            <div class="card-body">
                <div class="title-row">
                    <div class="ai-indicator" th:id="${prompt.aiModel} + '-indicator'"></div>
                    <h2 class="card-title" th:text="${prompt.title}">Заголовок</h2>
                </div>
                <p class="card-desc" th:text="${prompt.description}">Описание...</p>
            </div>

            <div class="card-footer">
                <ul class="tags">
                    <li class="tag" th:each="tag : ${#strings.arraySplit(prompt.tags, ',')}" th:text="${tag}">Тег</li>
                </ul>
            </div>

        </article>
    </main>
</div>
</body>
</html>
